<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>World Builder — Layered Frames</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #1a1714;
    color: #c8bfb4;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(212,184,150,0.2); border-radius: 4px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(26,23,20,0.95);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .header h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    color: #f0e6d6;
    letter-spacing: -0.01em;
  }
  .header .subtitle {
    font-size: 11px;
    color: #6b6358;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .copy-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(212,184,150,0.3);
    background: rgba(212,184,150,0.1);
    color: #d4b896;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.2s;
    display: none;
  }
  .copy-btn:hover { background: rgba(212,184,150,0.2); }
  .copy-btn.visible { display: inline-block; }

  /* Stage indicator */
  .stages {
    display: flex;
    gap: 2px;
    padding: 12px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .stages::-webkit-scrollbar { display: none; }
  .stage-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }
  .stage-pill.reached { background: rgba(212,184,150,0.15); }
  .stage-pill.current { border-color: rgba(212,184,150,0.4); }
  .stage-pill .icon { font-size: 12px; }
  .stage-pill .label {
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    color: #5a544c;
    font-weight: 400;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .stage-pill.reached .label { color: #d4b896; }
  .stage-pill.current .label { font-weight: 600; }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .message {
    display: flex;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  .message.user { justify-content: flex-end; }
  .message.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 85%;
    padding: 14px 18px;
    font-size: 14.5px;
    line-height: 1.65;
    letter-spacing: 0.01em;
  }
  .message.user .bubble {
    max-width: 75%;
    border-radius: 18px 18px 4px 18px;
    background: linear-gradient(135deg, #5c4a32, #4a3c28);
    color: #f0e6d6;
  }
  .message.assistant .bubble {
    border-radius: 18px 18px 18px 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    color: #c8bfb4;
  }
  .bubble h2 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 1.4em;
    margin: 0 0 8px 0;
    font-weight: 400;
  }
  .bubble h3 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 1.15em;
    margin: 12px 0 6px 0;
    font-weight: 400;
  }
  .bubble strong { color: #d4b896; }
  .bubble hr {
    border: none;
    border-top: 1px solid #3a3530;
    margin: 16px 0;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 6px;
    padding: 16px 20px;
    align-items: center;
  }
  .typing-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #8a7966;
  }
  .typing-dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
  .typing-dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.15s infinite; }
  .typing-dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.3s infinite; }

  /* Error */
  .error-msg {
    padding: 10px 16px;
    background: rgba(200,80,60,0.1);
    border: 1px solid rgba(200,80,60,0.2);
    border-radius: 10px;
    font-size: 13px;
    color: #c8503c;
    margin-bottom: 16px;
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(26,23,20,0.95);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: #e8dfd4;
    font-size: 14.5px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  .input-area textarea::placeholder { color: #5a544c; }
  .input-area textarea:focus { border-color: rgba(212,184,150,0.3); }
  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.04);
    color: #4a443c;
    font-size: 18px;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .send-btn.active {
    background: linear-gradient(135deg, #8a7147, #6b5a3e);
    color: #f0e6d6;
    cursor: pointer;
  }
  .input-hint {
    margin-top: 8px;
    font-size: 11px;
    color: #4a443c;
    text-align: center;
    letter-spacing: 0.02em;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }
  .modal-box {
    background: #252119;
    border: 1px solid rgba(212,184,150,0.2);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 20px;
    font-weight: 400;
    color: #f0e6d6;
  }
  .modal-close {
    background: none;
    border: none;
    color: #6b6358;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .modal-hint {
    font-size: 13px;
    color: #8a7d6f;
  }
  .modal-textarea {
    flex: 1;
    min-height: 300px;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.3);
    color: #d4cbbf;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.7;
    resize: none;
    outline: none;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// ⚠️  CONFIGURATION — EDIT THESE VALUES
// ============================================================
const API_KEY = "YOUR_ANTHROPIC_API_KEY_HERE";  // <-- 把你的 Anthropic API key 贴在这里
const MODEL   = "claude-sonnet-4-20250514";
// ============================================================

const SYSTEM_PROMPT = `You are a World-Building Guide for a university spatial design course called "Layered Frames." Your job is to help students construct a rich, original world and a character that lives in it — step by step, through conversation.

## Your approach
- Ask ONE question at a time. Never overwhelm the student.
- Be encouraging but push for specificity. If a student gives a vague answer, gently ask follow-up questions to draw out concrete, sensory details.
- Use vivid examples to inspire, but never impose your ideas. The world belongs to the student.
- Write in a warm, creative, slightly playful tone. You are a mentor, not an examiner.
- Respond in whichever language the student uses. If they write in Chinese, respond in Chinese. If English, respond in English. If mixed, match their mix.

## Conversation flow
Guide the student through these stages IN ORDER. Move to the next stage only when the current one has enough detail. You may ask 1-3 questions per stage depending on how much detail the student provides.

**Stage 1: The Seed**
Start by asking: "Describe a single image, feeling, or idea that could be the seed of your world. It can be as vague as a colour, a sound, or a half-remembered dream."
Help them expand this seed into something concrete.

**Stage 2: The Core Rule (这个世界最核心的一条规则是什么？)**
What is fundamentally different about this world compared to ours? What is the ONE rule that defines everything? Push for something specific and surprising — not just "it's in the future" or "there's magic." The best rules are simple but have deep consequences.

**Stage 3: Spatial Logic (人们住在什么样的空间里？怎么移动？)**
Where do people live? What do the spaces look like? How do people get from place A to place B? What areas are forbidden? What areas does everyone pass through? This is crucial — the students are spatial designers, so this is where they should shine.

**Stage 4: Sensory Experience (这个世界的感官体验是什么？)**
What does this world smell like, sound like, feel like? What is the quality of light? What is the temperature? Push beyond visual descriptions — films are multisensory experiences.

**Stage 5: Scarcity and Power (什么东西是稀缺的？谁拥有它？)**
What resource, quality, or thing is everyone competing for? Who has it and who doesn't? This creates the world's core tension and social structure.

**Stage 6: The Scar (发生过什么重大事件影响了现在？)**
What major event happened in the past that still shapes life today? Just one event is enough. It should explain why things are the way they are now.

**Stage 7: The Character (角色)**
Now that the world exists, who lives in it? Ask for:
- Name and role (what do they do?)
- How do they speak? (speech patterns, verbal habits)
- What secret do they carry?
Keep this brief — the character should feel like a natural product of the world, not the other way around.

**Stage 8: Summary**
When all stages are complete, say "Your world is ready! Here is your complete world profile:" and output a clean, formatted summary using EXACTLY this structure:

---
**🌍 World Profile**

**这个世界最核心的一条规则是什么？**
[content]

**人们住在什么样的空间里？怎么移动？**
[content]

**这个世界的感官体验是什么？**
[content]

**什么东西是稀缺的？谁拥有它？**
[content]

**发生过什么重大事件影响了现在？**
[content]

**🧑 Character Profile**

**角色叫什么？做什么的？**
[content]

**怎么说话？**
[content]

**有什么秘密？**
[content]
---

After outputting the summary, tell the student they can copy this into their Google Form submission.

## Important rules
- NEVER generate a world FOR the student. Always build FROM their ideas.
- If a student is stuck, offer 2-3 wildly different example directions to choose from, but make it clear these are just sparks.
- Keep your responses concise — no more than 2-3 short paragraphs per message.
- Remember all previous context in the conversation and reference it naturally.
- Celebrate interesting ideas when you hear them.`;

const WELCOME = `# Welcome, World Builder 🌍

Before you fill out the character form, let's build your world together. I'll guide you through a series of questions — by the end, you'll have a complete world and character ready to go.

There are no wrong answers. The best worlds come from the strangest ideas.

**Let's start with a seed.** Describe a single image, feeling, or idea — it can be as vague as a colour, a sound, a texture, or a half-remembered dream. What's the first spark of your world?`;

const STAGES = [
  { id:1, label:"Seed",      icon:"🌱" },
  { id:2, label:"Rule",      icon:"⚡" },
  { id:3, label:"Space",     icon:"🏗️" },
  { id:4, label:"Senses",    icon:"👁️" },
  { id:5, label:"Power",     icon:"⚖️" },
  { id:6, label:"History",   icon:"📜" },
  { id:7, label:"Character", icon:"🧑" },
  { id:8, label:"Complete",  icon:"✨" },
];

// ── State ──
let messages = [{ role:"assistant", content: WELCOME }];
let currentStage = 1;
let isLoading = false;
let modalOpen = false;

// ── DOM references ──
const $ = s => document.querySelector(s);
const chatArea   = () => $("#chat-area");
const inputEl    = () => $("#msg-input");
const sendBtn    = () => $("#send-btn");
const copyBtn    = () => $("#copy-btn");

// ── Rendering ──
function formatMarkdown(text) {
  return text
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n---\n/g, '<hr/>')
    .replace(/\n\n/g, '<br/><br/>')
    .replace(/\n/g, '<br/>');
}

function renderMessages() {
  const area = chatArea();
  let html = '';
  for (const msg of messages) {
    html += `<div class="message ${msg.role}"><div class="bubble">${formatMarkdown(msg.content)}</div></div>`;
  }
  if (isLoading) {
    html += '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  }
  html += '<div id="chat-end"></div>';
  area.innerHTML = html;
  document.getElementById('chat-end').scrollIntoView({ behavior:'smooth' });
}

function renderStages() {
  const container = $("#stages");
  container.innerHTML = STAGES.map(s => {
    let cls = 'stage-pill';
    if (currentStage >= s.id) cls += ' reached';
    if (currentStage === s.id) cls += ' current';
    return `<div class="${cls}"><span class="icon">${s.icon}</span><span class="label">${s.label}</span></div>`;
  }).join('');
}

function updateCopyBtn() {
  copyBtn().classList.toggle('visible', currentStage >= 8);
}

function updateSendBtn() {
  const active = inputEl().value.trim() && !isLoading;
  sendBtn().classList.toggle('active', active);
}

// ── Stage detection ──
function detectStage() {
  const recent = messages.filter(m => m.role === 'assistant').slice(-3).map(m => m.content.toLowerCase()).join(' ');
  if (recent.includes("world profile") || recent.includes("world is ready")) return 8;
  if (recent.includes("secret") || recent.includes("秘密") || recent.includes("角色叫")) return 7;
  if (recent.includes("scar") || recent.includes("major event") || recent.includes("重大事件") || recent.includes("发生过什么")) return 6;
  if (recent.includes("scarc") || recent.includes("power") || recent.includes("稀缺") || recent.includes("competing")) return 5;
  if (recent.includes("sensor") || recent.includes("smell") || recent.includes("sound") || recent.includes("感官")) return 4;
  if (recent.includes("spatial") || recent.includes("space") || recent.includes("live") || recent.includes("空间") || recent.includes("移动")) return 3;
  if (recent.includes("core rule") || recent.includes("fundamental") || recent.includes("核心") || recent.includes("规则")) return 2;
  return 1;
}

// ── API call ──
async function sendMessage() {
  const text = inputEl().value.trim();
  if (!text || isLoading) return;

  messages.push({ role:"user", content: text });
  inputEl().value = '';
  inputEl().style.height = 'auto';
  isLoading = true;
  updateSendBtn();
  renderMessages();

  try {
    const apiMessages = messages.map(m => ({ role: m.role, content: m.content }));

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: apiMessages,
      })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.error?.message || `API error ${resp.status}`);
    }

    const data = await resp.json();
    const reply = data.content.filter(c => c.type === 'text').map(c => c.text).join('\n');
    messages.push({ role:"assistant", content: reply });

    const newStage = detectStage();
    if (newStage > currentStage) currentStage = newStage;

  } catch (err) {
    console.error(err);
    const area = chatArea();
    area.innerHTML += `<div class="error-msg">⚠️ ${err.message || "Connection lost. Please try again."}</div><div id="chat-end"></div>`;
    document.getElementById('chat-end').scrollIntoView({ behavior:'smooth' });
  } finally {
    isLoading = false;
  }

  renderMessages();
  renderStages();
  updateCopyBtn();
  updateSendBtn();
  inputEl().focus();
}

// ── Modal ──
function getSummaryText() {
  for (let i = messages.length - 1; i >= 0; i--) {
    if (messages[i].role === 'assistant' && 
        (messages[i].content.includes('World Profile') || messages[i].content.includes('世界档案'))) {
      return messages[i].content;
    }
  }
  return messages[messages.length - 1]?.content || '';
}

function openModal() {
  modalOpen = true;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'copy-modal';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-header">
        <h2>Your World Profile</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <p class="modal-hint">Select all (Ctrl+A / Cmd+A) and copy (Ctrl+C / Cmd+C), then paste into Google Form.</p>
      <textarea class="modal-textarea" readonly id="modal-text">${getSummaryText().replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
    </div>
  `;
  document.body.appendChild(overlay);
  setTimeout(() => {
    const ta = document.getElementById('modal-text');
    if (ta) { ta.focus(); ta.select(); }
  }, 100);
}

function closeModal() {
  modalOpen = false;
  const el = document.getElementById('copy-modal');
  if (el) el.remove();
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <h1>World Builder</h1>
        <span class="subtitle">Layered Frames</span>
      </div>
      <button class="copy-btn" id="copy-btn" onclick="openModal()">📋 Copy World Profile</button>
    </div>
    <div class="stages" id="stages"></div>
    <div class="chat-area" id="chat-area"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="msg-input" placeholder="Describe your world..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>
  `;

  renderMessages();
  renderStages();
  updateCopyBtn();

  inputEl().addEventListener('input', (e) => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
    updateSendBtn();
  });

  inputEl().addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // API key check
  if (API_KEY === "YOUR_ANTHROPIC_API_KEY_HERE") {
    chatArea().innerHTML += '<div class="error-msg">⚠️ API key not configured. Please edit the HTML file and replace YOUR_ANTHROPIC_API_KEY_HERE with your Anthropic API key.</div>';
  }
});
</script>
</body>
</html>
